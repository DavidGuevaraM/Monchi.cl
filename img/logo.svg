<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 122">
  <defs>
    <!-- Degradado ala izquierda: oscuro en centro → claro en punta -->
    <linearGradient id="lw" x1="200" y1="0" x2="36" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7A4F4A"/>
      <stop offset="100%" stop-color="#D4A5A0"/>
    </linearGradient>
    <!-- Degradado ala derecha -->
    <linearGradient id="rw" x1="200" y1="0" x2="364" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7A4F4A"/>
      <stop offset="100%" stop-color="#D4A5A0"/>
    </linearGradient>
  </defs>

  <!-- ── ALA IZQUIERDA ─────────────────────────────────── -->
  <!-- Blade que nace en el centro (200,36), barre hacia la izquierda
       y apunta en (36,12). Borde superior arqueado, inferior suave. -->
  <path d="M 200,36 C 155,22 98,9 36,12 C 98,15 155,39 200,49 Z"
        fill="url(#lw)"/>

  <!-- ── ALA DERECHA ──────────────────────────────────── -->
  <path d="M 200,36 C 245,22 302,9 364,12 C 302,15 245,39 200,49 Z"
        fill="url(#rw)"/>

  <!-- ── GELY · Playfair Display bold ─────────────────── -->
  <text x="200" y="90"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-size="37"
        font-weight="700"
        fill="#7A4F4A"
        letter-spacing="6">GELY</text>

  <!-- ── BOUTIQUE · Nunito ligero + tracking amplio ────── -->
  <text x="200" y="110"
        text-anchor="middle"
        font-family="'Nunito', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="400"
        fill="#C08880"
        letter-spacing="10">BOUTIQUE</text>

</svg>
