name: Deploy GELYboutique to GitHub Pages

on:
  push:
    branches:
      - claude/gelyboutique-ecommerce-platform-z435jg
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (gelyboutique subfolder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: gelyboutique

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
